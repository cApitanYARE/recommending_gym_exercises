name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.docker-cache
          key: ${{ runner.os }}-docker-${{ hashFiles('back/**') }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Build Docker image
        run: |
          docker build \
            --cache-from=type=local,src=/tmp/.docker-cache \
            --tag recomendexercises_gym-api \
            ./back
          mkdir -p /tmp/.docker-cache
          docker save recomendexercises_gym-api | tar -C /tmp/.docker-cache -xf -

      - name: Save Docker image
        run: docker save recomendexercises_gym-api -o image.tar

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Install test dependencies
        run: |
          docker run --rm \
            recomendexercises_gym-api \
            pip install pytest-asyncio httpx

      - name: Run tests
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            recomendexercises_gym-api \
            sh -c "pip install pytest-asyncio httpx && PYTHONPATH=/workspace pytest tests/integration_tests.py tests/unit_tests.py -v"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Deploy with Docker Compose
        run: docker compose up -d