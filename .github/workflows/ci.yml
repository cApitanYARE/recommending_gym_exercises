name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t recomendexercises_gym-api ./back

      - name: Save Docker image
        run: docker save recomendexercises_gym-api -o image.tar

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Debug - show structure
        run: |
          echo "=== Structure in runner ==="
          ls -la
          echo "=== Tests directory ==="
          ls -la tests/
          echo "=== Content of tests ==="
          cat tests/integration_tests.py | head -20

      - name: Run tests
        run: |
          docker run --rm \
            -v $(pwd):/app \
            -w /app \
            recomendexercises_gym-api \
            pytest tests/integration_tests.py tests/unit_tests.py -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Deploy with Docker Compose
        run: docker compose up -d