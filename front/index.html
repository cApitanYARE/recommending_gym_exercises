<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
<div class="form" id="form">
           <div class="textare_wrap">
            <p id="info">Please, enter the form</p>

            <div>
                <p>Name</p>
                <textarea name="name" id="name" placeholder="Enter name"></textarea>
            </div>

            <div>
                <p>Age</p>
                <input type="number" name="age" id="age" min="14" max="90" placeholder="from 14...90">
            </div>

            <div>
                <p>Gender</p>
                <select name="gender" id="gender">
                    <option value="">Empty</option>
                    <option value="male">Male</option>

                    <option value="female">Female</option>
                </select>
            </div>

            <div>
                <p>Experience</p>
                <select name="experience" id="experience">
                    <option value="">Empty</option>
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                </select>
            </div>

            <div>
                <p>Goal</p>
                <select name="goal" id="goal">
                    <option value="">Empty</option>
                    <option value="mass">Mass Gain</option>
                    <option value="weight_loss">Weight loss</option>
                    <option value="toning">Toning</option>
                    <option value="strength">Strength</option>
                </select>
            </div>

            <div>
                <p>Amount of days</p>
                <select name="days_per_week" id="days_per_week">
                    <option value="">Empty</option>
                    <option value="3">3 days</option>
                    <option value="4">4 days</option>
                    <option value="5">5 days</option>
                    <option value="6">6 days</option>
                    <option value="7">7 days</option>
                </select>
            </div>
        </div>

        <button onclick="btn_confirm_form()">Confirm</button>
</div>

    <script src="script.js"></script>
</body>
</html>
